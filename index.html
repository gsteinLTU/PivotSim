<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PivotSim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 1fr 60px;
      height: 100vh;
    }
    #config-panel {
      grid-row: 1 / -1;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      overflow-y: auto;
    }
    #viewport {
      grid-row: 1;
      grid-column: 2;
      background: #0a0a1a;
    }
    #timeline {
      grid-row: 2;
      grid-column: 2;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="config-panel"></div>
    <div id="viewport"></div>
    <div id="timeline">Timeline (Phase 2)</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
