<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PivotSim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }
    #app {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 1fr 80px;
      height: 100vh;
    }
    #config-panel {
      grid-row: 1 / -1;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      overflow-y: auto;
    }
    #viewport {
      grid-row: 1;
      grid-column: 2;
      background: #0a0a1a;
    }
    #timeline {
      grid-row: 2;
      grid-column: 2;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="config-panel"></div>
    <div id="viewport" style="position:relative;">
      <div id="clearance-readout"
           style="position:absolute; top:16px; left:16px; z-index:10;
                  background:rgba(0,0,0,0.7); color:#22ff88; font-size:13px;
                  font-family:monospace; padding:6px 14px; border-radius:4px;
                  pointer-events:none; display:none;">
        Clear
      </div>
    </div>
    <div id="timeline"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
